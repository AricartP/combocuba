<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComboCuba Express | Pedido Directo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-28">

    <!-- Header -->
    <nav class="bg-red-700 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic">COMBOCUBA <span class="text-yellow-400">EXPRESS</span></h1>
            <div id="order-id-display" class="bg-red-900 px-3 py-1 rounded border border-red-400 font-mono text-yellow-300 font-bold text-sm"></div>
        </div>
    </nav>

    <!-- 1. Catálogo de Selección -->
    <section class="container mx-auto px-4 py-6">
        <h2 class="text-xl font-bold text-center mb-6 uppercase italic border-b-2 border-red-600 inline-block">1. Elige tu Combo</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
            <div id="card-CARNE" onclick="setCombo('COMBO CARNE', 'card-CARNE')" class="bg-white p-4 rounded-2xl shadow border-2 border-transparent cursor-pointer hover:border-red-500 transition active:scale-95">
                <h3 class="font-black text-lg">🍖 COMBO CARNE</h3>
                <p class="text-gray-500 text-xs mt-1 italic italic">Cerdo, Arroz, Granos y Aceite.</p>
            </div>
            <div id="card-ASEO" onclick="setCombo('COMBO ASEO', 'card-ASEO')" class="bg-white p-4 rounded-2xl shadow border-2 border-transparent cursor-pointer hover:border-blue-500 transition active:scale-95">
                <h3 class="font-black text-lg">🧼 COMBO ASEO</h3>
                <p class="text-gray-500 text-xs mt-1 italic italic">Kit de higiene y limpieza.</p>
            </div>
            <div id="card-MIXTO" onclick="setCombo('COMBO MIXTO', 'card-MIXTO')" class="bg-white p-4 rounded-2xl shadow border-2 border-transparent cursor-pointer hover:border-purple-500 transition active:scale-95">
                <h3 class="font-black text-lg">✨ COMBO MIXTO</h3>
                <p class="text-gray-500 text-xs mt-1 italic italic">Alimentos + Aseo Personal.</p>
            </div>
        </div>
    </section>

    <!-- 2. Formulario de Datos -->
    <section class="container mx-auto px-4">
        <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-200">
            <h2 class="text-center font-black text-gray-700 mb-6 uppercase italic tracking-tighter">2. Datos de Entrega</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Nombre y Apellidos de quien recibe:</label>
                    <input type="text" id="nombre" placeholder="Nombre completo" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Dirección Exacta:</label>
                    <textarea id="direccion" placeholder="Calle, número, entre calles y municipio" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition" rows="2"></textarea>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Teléfono de quien recibe:</label>
                    <input type="tel" id="telefono" placeholder="Ej: 535..." class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2 mb-1">Método de Pago:</label>
                    <select id="pago" class="w-full p-4 border rounded-xl bg-gray-50 font-bold text-gray-700 outline-none focus:border-red-600">
                        <option value="Zelle">Zelle</option>
                        <option value="Transferencia Bancaria (IBAN)">Transferencia Bancaria (IBAN)</option>
                        <option value="Transferencia México">Transferencia México</option>
                        <option value="Criptomonedas / Binance">Criptomonedas / Binance</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- 3. Botón de Acción -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t z-50">
        <button onclick="procesarPedido()" class="max-w-xl mx-auto bg-green-600 text-white w-full py-5 rounded-2xl font-black shadow-2xl flex items-center justify-center text-lg active:scale-95 transition-all">
            <i class="fab fa-whatsapp mr-3 text-3xl"></i> COMPLETAR PEDIDO
        </button>
        <p class="text-[8px] text-center text-gray-400 mt-2 uppercase font-bold tracking-widest">Al hacer clic se registrará el pedido y se abrirá WhatsApp</p>
    </div>

    <!-- Iframe invisible para el envío silencioso -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        // CONFIGURACIÓN FINAL
        const miTelefono = "17864512020";
        const formActionURL = "https://docs.google.com/forms/d/e/1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg/formResponse";
        
        // Mapeo exacto de tus Entry IDs
        const entries = {
            idOrden: "entry.905253419",
            combo: "entry.1180910425",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        let selectedCombo = "";
        const orderID = `CC-${String.fromCharCode(65 + Math.floor(Math.random() * 26))}${Date.now().toString().slice(-5)}`;
        document.getElementById('order-id-display').innerText = orderID;

        function setCombo(name, id) {
            selectedCombo = name;
            // Estética de selección
            ["card-CARNE", "card-ASEO", "card-MIXTO"].forEach(c => {
                document.getElementById(c).classList.remove('border-red-600', 'bg-red-50', 'shadow-inner');
            });
            document.getElementById(id).classList.add('border-red-600', 'bg-red-50', 'shadow-inner');
        }

        function procesarPedido() {
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            const tel = document.getElementById('telefono').value;
            const pag = document.getElementById('pago').value;

            if (!selectedCombo || !nom || !dir || !tel) {
                alert("Por favor: Selecciona un combo y completa todos los campos de entrega.");
                return;
            }

            // --- PASO 1: SILENT FORM SUBMISSION (Envío al Excel) ---
            const form = document.createElement("form");
            form.action = formActionURL;
            form.method = "POST";
            form.target = "hidden_iframe";

            const data = {
                [entries.idOrden]: orderID,
                [entries.combo]: selectedCombo,
                [entries.nombre]: nom,
                [entries.direccion]: dir,
                [entries.telefono]: tel,
                [entries.pago]: pag
            };

            for (let key in data) {
                let input = document.createElement("input");
                input.type = "hidden";
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit(); // Se envía al Excel sin que el usuario lo note

            // --- PASO 2: ABRIR WHATSAPP CON EL RESUMEN ---
            const msg = `*Nuevo Pedido - Combo Cuba Express*\n\n` +
                        `*ID Orden:* ${orderID}\n` +
                        `*Producto:* ${selectedCombo}\n` +
                        `*Método de Pago:* ${pag}\n\n` +
                        `*DATOS DEL DESTINATARIO:*\n` +
                        `*Nombre:* ${nom}\n` +
                        `*Dirección:* ${dir}\n` +
                        `*Teléfono:* ${tel}\n\n` +
                        `_Muchas gracias por confiar en nosotros. El pedido ya está registrado, espero los datos para pagar._`;

            // Pequeña pausa para asegurar la salida de los datos
            setTimeout(() => {
                window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank');
            }, 400);
        }
    </script>
</body>
</html>
