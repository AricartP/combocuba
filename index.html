<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEPURACIÓN FINAL | ComboCuba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-28">

    <nav class="bg-black p-4 text-white shadow-lg sticky top-0 z-50 text-center">
        <h1 class="text-xl font-black italic text-yellow-400">MODO VISIBLE: VERIFICACIÓN DE DATOS</h1>
    </nav>

    <!-- 1. Interfaz de Entrada -->
    <section class="container mx-auto px-4 py-6">
        <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-xl border-2 border-blue-500">
            <h2 class="text-center font-black text-gray-700 mb-6 uppercase italic">Escribe los datos aquí</h2>
            
            <div class="space-y-4">
                <!-- Selector de Combo (Nuevo en esta vista) -->
                <select id="combo_select" onchange="sincronizar()" class="w-full p-4 border-2 border-red-200 rounded-xl font-bold bg-red-50">
                    <option value="">-- SELECCIONA UN COMBO --</option>
                    <option value="COMBO CARNE">COMBO CARNE</option>
                    <option value="COMBO ASEO">COMBO ASEO</option>
                    <option value="COMBO MIXTO">COMBO MIXTO</option>
                </select>

                <input type="text" id="nombre" oninput="sincronizar()" placeholder="Nombre de quien recibe" class="w-full p-4 border-2 border-blue-100 rounded-xl outline-none focus:border-blue-500">
                
                <textarea id="direccion" oninput="sincronizar()" placeholder="Dirección Exacta" class="w-full p-4 border-2 border-blue-100 rounded-xl outline-none focus:border-blue-500"></textarea>
                
                <input type="tel" id="telefono" oninput="sincronizar()" placeholder="Teléfono" class="w-full p-4 border-2 border-blue-100 rounded-xl outline-none focus:border-blue-500">
                
                <!-- Métodos de pago exactos -->
                <select id="pago" onchange="sincronizar()" class="w-full p-4 border-2 border-blue-100 rounded-xl font-bold">
                    <option value="IBAN EUROPA">IBAN EUROPA</option>
                    <option value="ZELLE USA">ZELLE USA</option>
                    <option value="BANK TRANSFER MEXICO">BANK TRANSFER MEXICO</option>
                    <option value="CRIPTOMONEDA">CRIPTOMONEDA</option>
                </select>
            </div>
        </div>
    </section>

    <!-- 2. Formulario de Google Visible (Espejo) -->
    <section class="container mx-auto px-4 py-6">
        <div class="max-w-xl mx-auto">
            <h2 class="text-xs font-bold text-gray-500 uppercase mb-2 text-center">👇 Verifica que los campos de abajo se llenen solos</h2>
            <div id="contenedor-iframe" class="border-4 border-dashed border-red-400 rounded-2xl overflow-hidden bg-white">
                <!-- El iframe se cargará aquí -->
            </div>
        </div>
    </section>

    <!-- 3. Botón de WhatsApp -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t z-50">
        <button onclick="enviarWhatsApp()" class="max-w-xl mx-auto bg-green-600 text-white w-full py-5 rounded-2xl font-black shadow-lg flex items-center justify-center text-lg">
            <i class="fab fa-whatsapp mr-3 text-3xl"></i> ENVIAR A WHATSAPP
        </button>
    </div>

    <script>
        const formBaseURL = "https://docs.google.com/forms/d/e/1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg/viewform";
        
        // IDs proporcionados por el usuario
        const entries = {
            idOrden: "entry.905253419",
            combo: "entry.1180910425",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        const testOrderID = "CC-" + Math.floor(Math.random() * 9999);

        function sincronizar() {
            const comb = encodeURIComponent(document.getElementById('combo_select').value);
            const nom = encodeURIComponent(document.getElementById('nombre').value);
            const dir = encodeURIComponent(document.getElementById('direccion').value);
            const tel = encodeURIComponent(document.getElementById('telefono').value);
            const pag = encodeURIComponent(document.getElementById('pago').value);

            const urlFinal = `${formBaseURL}?embedded=true` +
                             `&${entries.idOrden}=${testOrderID}` +
                             `&${entries.combo}=${comb}` +
                             `&${entries.nombre}=${nom}` +
                             `&${entries.direccion}=${dir}` +
                             `&${entries.telefono}=${tel}` +
                             `&${entries.pago}=${pag}`;

            document.getElementById('contenedor-iframe').innerHTML = 
                `<iframe src="${urlFinal}" width="100%" height="700" frameborder="0" marginheight="0" marginwidth="0">Cargando...</iframe>`;
        }

        function enviarWhatsApp() {
            const nom = document.getElementById('nombre').value;
            const comb = document.getElementById('combo_select').value;
            alert("PASO FINAL DE PRUEBA: Si abajo ves los datos llenos, dale al botón 'ENVIAR' del formulario de Google (dentro del cuadro blanco) para ver si llega al Excel.");
            window.open(`https://wa.me/17864512020?text=Pedido de prueba: ${comb} para ${nom}`, '_blank');
        }

        // Cargar iframe inicial
        sincronizar();
    </script>
</body>
</html>
