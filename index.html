<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComboCuba Store | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-card img { transition: transform 0.3s ease; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="pb-24">

    <!-- Header Fijo -->
    <nav class="bg-white border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-900 text-red-600 italic">COMBOCUBA</h1>
        <button onclick="showView('view-carrito')" class="relative p-2">
            <i class="fas fa-shopping-basket text-2xl text-gray-700"></i>
            <span id="cart-count" class="absolute top-0 right-0 bg-red-600 text-white text-[10px] font-bold px-1.5 rounded-full">0</span>
        </button>
    </nav>

    <!-- VISTA 1: CATÁLOGO -->
    <section id="view-catalogo" class="view active container mx-auto px-4 py-6">
        <h2 class="text-2xl font-900 text-gray-800 mb-6 uppercase">Nuestros Combos</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Producto 1 -->
            <div class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                <img src="https://images.unsplash.com/photo-1603048297172-c92544798d5e?q=80&w=500" class="w-full h-48 object-cover">
                <div class="p-5">
                    <h3 class="font-bold text-lg uppercase">Combo Carne Premium</h3>
                    <p class="text-gray-500 text-sm mb-4">Incluye Cerdo, Pollo y Ahumados seleccionados.</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-900 text-red-600">$85.00</span>
                        <button onclick="addToCart('Combo Carne', 85.00)" class="bg-gray-900 text-white px-4 py-2 rounded-xl font-bold active:scale-90 transition">Agregar</button>
                    </div>
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=500" class="w-full h-48 object-cover">
                <div class="p-5">
                    <h3 class="font-bold text-lg uppercase">Combo Aseo Full</h3>
                    <p class="text-gray-500 text-sm mb-4">Detergente, Jabones, Desodorante y más.</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-900 text-red-600">$45.00</span>
                        <button onclick="addToCart('Combo Aseo', 45.00)" class="bg-gray-900 text-white px-4 py-2 rounded-xl font-bold active:scale-90 transition">Agregar</button>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- VISTA 2: CARRITO -->
    <section id="view-carrito" class="view container mx-auto px-4 py-6">
        <button onclick="showView('view-catalogo')" class="text-sm font-bold text-gray-500 mb-4 flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> VOLVER AL CATÁLOGO
        </button>
        <h2 class="text-2xl font-900 text-gray-800 mb-6 uppercase">Tu Carrito</h2>
        <div id="cart-items" class="space-y-4 mb-8">
            <!-- Aquí se cargan los productos elegidos -->
        </div>
        <div class="bg-white p-6 rounded-3xl border shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-500 font-bold">TOTAL A PAGAR:</span>
                <span id="cart-total" class="text-3xl font-900 text-red-600">$0.00</span>
            </div>
            <button onclick="showView('view-checkout')" class="w-full bg-red-600 text-white py-5 rounded-2xl font-900 shadow-lg text-lg">PROCESAR PAGO</button>
        </div>
    </section>

    <!-- VISTA 3: DATOS Y PAGO (Tu código actual) -->
    <section id="view-checkout" class="view container mx-auto px-4 py-6">
        <button onclick="showView('view-carrito')" class="text-sm font-bold text-gray-500 mb-4 flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> REVISAR CARRITO
        </button>
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4">
            <h2 class="font-900 text-gray-800 uppercase italic">Datos de Entrega</h2>
            <input type="text" id="nombre" placeholder="Nombre de quien recibe" class="w-full p-4 border rounded-xl bg-gray-50">
            <textarea id="direccion" placeholder="Dirección en Cuba" class="w-full p-4 border rounded-xl bg-gray-50" rows="2"></textarea>
            <input type="tel" id="telefono" placeholder="Teléfono" class="w-full p-4 border rounded-xl bg-gray-50">
            
            <label class="block text-[10px] font-bold text-gray-400 uppercase">Método de Pago</label>
            <select id="pago" class="w-full p-4 border rounded-xl bg-gray-50 font-bold">
                <option value="IBAN EUROPA">IBAN EUROPA</option>
                <option value="ZELLE USA">ZELLE USA</option>
                <option value="BANK TRANSFER MEXICO">BANK TRANSFER MEXICO</option>
                <option value="CRIPTOMONEDA">CRIPTOMONEDA</option>
            </select>
            
            <button onclick="enviarOrdenFinal()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-900 shadow-lg flex items-center justify-center space-x-3 mt-4">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>FINALIZAR PEDIDO</span>
            </button>
        </div>
    </section>

    <script>
        let cart = [];
        const miTelefono = "17864512020";
        const formID = "1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg";
        
        // Función para cambiar de vista
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0,0);
        }

        // Lógica del Carrito
        function addToCart(name, price) {
            cart.push({name, price});
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            container.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border">
                        <div>
                            <h4 class="font-bold uppercase text-sm">${item.name}</h4>
                            <p class="text-red-600 font-bold">$${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-gray-300"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
            totalEl.innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // Envío Final
        function enviarOrdenFinal() {
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            const tel = document.getElementById('telefono').value;
            const pag = document.getElementById('pago').value;

            if (cart.length === 0 || !nom || !dir) {
                alert("Completa todos los datos y asegúrate de tener productos en el carrito.");
                return;
            }

            const comboLista = cart.map(item => item.name).join(", ");
            const totalFinal = document.getElementById('cart-total').innerText;
            const orderID = "CC-" + Math.floor(1000 + Math.random() * 9000);

            // URL para tu Google Sheets (Asegúrate que los entries coincidan)
            const sendURL = `https://docs.google.com/forms/d/e/${formID}/formResponse?` +
                            `entry.905253419=${encodeURIComponent(orderID)}&` +
                            `entry.1180910425=${encodeURIComponent(comboLista + " (Total: " + totalFinal + ")")}&` +
                            `entry.1029821607=${encodeURIComponent(nom)}&` +
                            `entry.2133758458=${encodeURIComponent(dir)}&` +
                            `entry.922501452=${encodeURIComponent(tel)}&` +
                            `entry.895797247=${encodeURIComponent(pag)}&submit=Submit`;

            fetch(sendURL, { mode: 'no-cors' });

            const msg = `*NUEVA ORDEN: ${orderID}*\n` +
                        `--------------------------\n` +
                        `🛒 *PRODUCTOS:* ${comboLista}\n` +
                        `💰 *TOTAL:* ${totalFinal}\n` +
                        `💳 *PAGO:* ${pag}\n` +
                        `--------------------------\n` +
                        `👤 *RECIBE:* ${nom}\n` +
                        `📍 *DIRECCIÓN:* ${dir}\n` +
                        `📞 *TEL:* ${tel}`;

            setTimeout(() => {
                window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank');
            }, 400);
        }
    </script>
</body>
</html>
