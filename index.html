<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComboCuba Express | Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .combo-card.selected { border-color: #ef4444; background-color: #fef2f2; transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-100 pb-32">

    <nav class="bg-red-700 p-4 text-white shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-black italic">COMBOCUBA <span class="text-yellow-400">EXPRESS</span></h1>
        <span id="order-id" class="text-[10px] font-mono bg-red-900 px-2 py-1 rounded"></span>
    </nav>

    <div class="container mx-auto px-4 py-6 max-w-xl">
        
        <h2 class="font-black text-gray-700 mb-4 uppercase text-sm italic">Paso 1: Elige tu Combo</h2>
        <div class="grid grid-cols-1 gap-3 mb-8">
            <div id="btn-CARNE" onclick="selectCombo('COMBO CARNE', 'btn-CARNE')" class="combo-card bg-white p-4 rounded-2xl shadow-sm border-2 border-transparent cursor-pointer transition-all flex justify-between items-center">
                <span class="font-bold">🍖 COMBO CARNE</span>
                <i class="fas fa-check-circle text-gray-200"></i>
            </div>
            <div id="btn-ASEO" onclick="selectCombo('COMBO ASEO', 'btn-ASEO')" class="combo-card bg-white p-4 rounded-2xl shadow-sm border-2 border-transparent cursor-pointer transition-all flex justify-between items-center">
                <span class="font-bold">🧼 COMBO ASEO</span>
                <i class="fas fa-check-circle text-gray-200"></i>
            </div>
            <div id="btn-MIXTO" onclick="selectCombo('COMBO MIXTO', 'btn-MIXTO')" class="combo-card bg-white p-4 rounded-2xl shadow-sm border-2 border-transparent cursor-pointer transition-all flex justify-between items-center">
                <span class="font-bold">✨ COMBO MIXTO</span>
                <i class="fas fa-check-circle text-gray-200"></i>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4">
            <h2 class="font-black text-gray-700 mb-2 uppercase text-sm italic">Paso 2: Datos de Entrega</h2>
            <input type="text" id="nombre" placeholder="Nombre de quien recibe" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500">
            <textarea id="direccion" placeholder="Dirección Exacta en Cuba" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500" rows="2"></textarea>
            <input type="tel" id="telefono" placeholder="Teléfono de contacto" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-500">
            
            <label class="block text-[10px] font-bold text-gray-400 uppercase ml-1">Método de Pago</label>
            <select id="pago" class="w-full p-4 border rounded-xl bg-gray-50 font-bold">
                <option value="IBAN EUROPA">IBAN EUROPA</option>
                <option value="ZELLE USA">ZELLE USA</option>
                <option value="BANK TRANSFER MEXICO">BANK TRANSFER MEXICO</option>
                <option value="CRIPTOMONEDA">CRIPTOMONEDA</option>
            </select>
        </div>
    </div>

    <!-- Botón Flotante -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t z-50">
        <button onclick="finalizarPedido()" class="max-w-xl mx-auto bg-green-600 text-white w-full py-5 rounded-2xl font-black shadow-lg flex items-center justify-center text-lg active:scale-95 transition-transform">
            <i class="fab fa-whatsapp mr-3 text-2xl"></i> CONFIRMAR PEDIDO
        </button>
    </div>

    <script>
        const miTelefono = "17864512020";
        const formID = "1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg";
        
        const entries = {
            idOrden: "entry.905253419",
            combo: "entry.1180910425",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        let selectedCombo = "";
        const orderID = "CC-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('order-id').innerText = orderID;

        function selectCombo(nombre, id) {
            selectedCombo = nombre;
            document.querySelectorAll('.combo-card').forEach(c => {
                c.classList.remove('selected');
                c.querySelector('i').classList.replace('text-red-500', 'text-gray-200');
            });
            const active = document.getElementById(id);
            active.classList.add('selected');
            active.querySelector('i').classList.replace('text-gray-200', 'text-red-500');
        }

        function finalizarPedido() {
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            const tel = document.getElementById('telefono').value;
            const pag = document.getElementById('pago').value;

            if (!selectedCombo || !nom || !dir || !tel) {
                alert("⚠️ Completa todos los campos antes de enviar.");
                return;
            }

            // Construcción de URL de envío directo (POST simulado)
            const sendURL = `https://docs.google.com/forms/d/e/${formID}/formResponse?` +
                            `${entries.idOrden}=${encodeURIComponent(orderID)}&` +
                            `${entries.combo}=${encodeURIComponent(selectedCombo)}&` +
                            `${entries.nombre}=${encodeURIComponent(nom)}&` +
                            `${entries.direccion}=${encodeURIComponent(dir)}&` +
                            `${entries.telefono}=${encodeURIComponent(tel)}&` +
                            `${entries.pago}=${encodeURIComponent(pag)}&submit=Submit`;

            // Ejecutar envío en segundo plano e ir a WhatsApp
            const msg = `*NUEVO PEDIDO: ${orderID}*\n\n` +
                        `📦 *Combo:* ${selectedCombo}\n` +
                        `👤 *Cliente:* ${nom}\n` +
                        `📍 *Dirección:* ${dir}\n` +
                        `📞 *Tel:* ${tel}\n` +
                        `💳 *Pago:* ${pag}`;

            // Abrimos el link de Google en una pestaña pequeña/oculta o simplemente redirigimos
            // Para asegurar que llegue al Excel, usamos un fetch "no-cors"
            fetch(sendURL, { mode: 'no-cors' });

            setTimeout(() => {
                window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank');
            }, 300);
        }
    </script>
</body>
</html>
