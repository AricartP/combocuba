<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComboCuba Store | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f3f4f6; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar con Carrito -->
    <nav class="bg-red-700 text-white sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-xl font-800 tracking-tighter italic">COMBOCUBA <span class="text-yellow-400">EXPRESS</span></h1>
        </div>
        <button onclick="showView('view-carrito')" class="relative p-2 bg-white/20 rounded-full">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-400 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md">0</span>
        </button>
    </nav>

    <!-- VISTA 1: CATÁLOGO -->
    <section id="view-catalogo" class="view active container mx-auto px-5 py-8 max-w-xl">
        <div class="flex items-center space-x-2 mb-6">
            <div class="w-2 h-6 bg-red-600 rounded-full"></div>
            <h2 class="font-800 text-gray-800 uppercase text-sm tracking-tight">Elige tus Productos</h2>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <!-- Producto 1 -->
            <div class="glass-card rounded-[2rem] overflow-hidden shadow-xl border border-white">
                <img src="https://images.unsplash.com/photo-1603048297172-c92544798d5e?q=80&w=500" class="w-full h-48 object-cover">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-800 text-lg uppercase text-gray-800">🍖 COMBO CARNE</h3>
                        <span class="bg-red-100 text-red-600 text-xs font-bold px-3 py-1 rounded-full">$85.00</span>
                    </div>
                    <p class="text-gray-500 text-xs mb-4">5lb Cerdo, 2lb Pollo, 1lb Ahumado y embutidos.</p>
                    <button onclick="addToCart('COMBO CARNE', 85.00)" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold active:scale-95 transition-all shadow-md">AGREGAR AL PEDIDO</button>
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="glass-card rounded-[2rem] overflow-hidden shadow-xl border border-white">
                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=500" class="w-full h-48 object-cover">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-800 text-lg uppercase text-gray-800">🧼 COMBO ASEO</h3>
                        <span class="bg-blue-100 text-blue-600 text-xs font-bold px-3 py-1 rounded-full">$45.00</span>
                    </div>
                    <p class="text-gray-500 text-xs mb-4">Detergente 1kg, 4 Jabones, Crema dental y Desodorante.</p>
                    <button onclick="addToCart('COMBO ASEO', 45.00)" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold active:scale-95 transition-all shadow-md">AGREGAR AL PEDIDO</button>
                </div>
            </div>
        </div>
    </section>

    <!-- VISTA 2: CARRITO -->
    <section id="view-carrito" class="view container mx-auto px-5 py-8 max-w-xl">
        <button onclick="showView('view-catalogo')" class="text-xs font-bold text-gray-400 mb-6 flex items-center uppercase tracking-widest">
            <i class="fas fa-arrow-left mr-2"></i> Seguir comprando
        </button>
        <h2 class="text-2xl font-800 text-gray-800 mb-6 uppercase italic">Tu Carrito</h2>
        
        <div id="cart-items" class="space-y-4 mb-8">
            <!-- Items Dinámicos -->
        </div>

        <div class="glass-card p-6 rounded-[2rem] shadow-2xl border-2 border-white">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-400 font-bold text-sm uppercase">Total a pagar:</span>
                <span id="cart-total" class="text-3xl font-800 text-red-600">$0.00</span>
            </div>
            <button onclick="showView('view-checkout')" id="btn-procesar" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-800 shadow-lg text-lg disabled:opacity-50" disabled>COMPLETAR DATOS</button>
        </div>
    </section>

    <!-- VISTA 3: CHECKOUT (Lógica de tu código anterior) -->
    <section id="view-checkout" class="view container mx-auto px-5 py-8 max-w-xl">
        <button onclick="showView('view-carrito')" class="text-xs font-bold text-gray-400 mb-6 flex items-center uppercase tracking-widest">
            <i class="fas fa-arrow-left mr-2"></i> Revisar productos
        </button>
        
        <div class="glass-card p-8 rounded-[2rem] shadow-2xl space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-800 text-gray-800 uppercase text-sm">Datos de Entrega</h2>
                <span id="order-id-display" class="text-[10px] font-bold bg-red-100 text-red-600 px-3 py-1 rounded-full uppercase"></span>
            </div>

            <div class="space-y-4">
                <input type="text" id="nombre" placeholder="Nombre de quien recibe" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-red-500 font-semibold text-gray-700">
                <textarea id="direccion" placeholder="Dirección exacta en Cuba" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-red-500 font-semibold text-gray-700" rows="3"></textarea>
                <input type="tel" id="telefono" placeholder="Teléfono de contacto" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-red-500 font-semibold text-gray-700">
                
                <div>
                    <label class="text-[10px] font-800 text-gray-400 uppercase ml-2 mb-2 block tracking-widest">Método de Pago</label>
                    <select id="pago" class="w-full p-4 bg-gray-100 border-none rounded-2xl font-bold text-gray-700 outline-none focus:ring-2 focus:ring-red-500 cursor-pointer">
                        <option value="IBAN EUROPA">🇪🇺 IBAN EUROPA</option>
                        <option value="ZELLE USA">🇺🇸 ZELLE USA</option>
                        <option value="BANK TRANSFER MEXICO">🇲🇽 BANK TRANSFER MEXICO</option>
                        <option value="CRIPTOMONEDA">₿ CRIPTOMONEDA</option>
                    </select>
                </div>
            </div>

            <button onclick="finalizarPedido()" class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-[1.5rem] font-800 text-lg flex items-center justify-center space-x-3 transition-all shadow-xl">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>ENVIAR ORDEN POR WHATSAPP</span>
            </button>
        </div>
    </section>

    <script>
        // CONFIGURACIÓN (Tu lógica original fusionada)
        const miTelefono = "17864512020";
        const formID = "1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg";
        const entries = {
            idOrden: "entry.905253419",
            combo: "entry.1180910425",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        let cart = [];
        const orderID = "CC-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('order-id-display').innerText = "ID: " + orderID;

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0,0);
        }

        function addToCart(name, price) {
            cart.push({name, price});
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const btnProcesar = document.getElementById('btn-procesar');
            
            container.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center shadow-sm border border-white">
                        <div>
                            <h4 class="font-800 text-sm uppercase text-gray-800">${item.name}</h4>
                            <p class="text-red-600 font-bold">$${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-gray-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-can"></i></button>
                    </div>
                `;
            });

            totalEl.innerText = `$${total.toFixed(2)}`;
            btnProcesar.disabled = cart.length === 0;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateUI();
        }

        function finalizarPedido() {
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            const tel = document.getElementById('telefono').value;
            const pag = document.getElementById('pago').value;

            if (cart.length === 0 || !nom || !dir || !tel) {
                alert("⚠️ Por favor, rellena todos los datos de entrega.");
                return;
            }

            // Unimos los nombres de los combos elegidos en un solo texto para el Excel
            const listaProductos = cart.map(item => item.name).join(", ");
            const totalTexto = document.getElementById('cart-total').innerText;
            const comboParaExcel = `${listaProductos} (Total: ${totalTexto})`;

            // CONSTRUCCIÓN DE LA URL (Usando tus entries verificados)
            const sendURL = `https://docs.google.com/forms/d/e/${formID}/formResponse?` +
                            `${entries.idOrden}=${encodeURIComponent(orderID)}&` +
                            `${entries.combo}=${encodeURIComponent(comboParaExcel)}&` +
                            `${entries.nombre}=${encodeURIComponent(nom)}&` +
                            `${entries.direccion}=${encodeURIComponent(dir)}&` +
                            `${entries.telefono}=${encodeURIComponent(tel)}&` +
                            `${entries.pago}=${encodeURIComponent(pag)}&submit=Submit`;

            const msg = `*NUEVO PEDIDO: ${orderID}*\n` +
                        `----------------------------\n` +
                        `📦 *PRODUCTOS:* ${listaProductos}\n` +
                        `💰 *TOTAL:* ${totalTexto}\n` +
                        `💳 *PAGO:* ${pag}\n` +
                        `----------------------------\n` +
                        `👤 *RECIBE:* ${nom}\n` +
                        `📍 *DIRECCIÓN:* ${dir}\n` +
                        `📞 *TEL:* ${tel}\n` +
                        `----------------------------\n` +
                        `_Generado por ComboCuba Store_`;

            // Envío silencioso al Excel
            fetch(sendURL, { mode: 'no-cors' });

            // Abrir WhatsApp
            setTimeout(() => {
                window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank');
            }, 300);
        }
    </script>
</body>
</html>
