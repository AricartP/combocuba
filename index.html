<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComboCuba Store | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f3f4f6; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar -->
    <nav class="bg-red-700 text-white sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-800 tracking-tighter italic">COMBOCUBA <span class="text-yellow-400">EXPRESS</span></h1>
        <button onclick="showView('view-carrito')" class="relative p-2 bg-white/20 rounded-full">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-400 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md">0</span>
        </button>
    </nav>

    <!-- VISTA 1: CATÁLOGO -->
    <section id="view-catalogo" class="view active container mx-auto px-5 py-8 max-w-xl">
        <div class="grid grid-cols-1 gap-6">
            <!-- Producto 1 -->
            <div class="glass-card rounded-[2rem] overflow-hidden shadow-xl border border-white">
                <img src="https://images.unsplash.com/photo-1603048297172-c92544798d5e?q=80&w=500" class="w-full h-48 object-cover">
                <div class="p-6">
                    <h3 class="font-800 text-lg uppercase text-gray-800">🍖 COMBO CARNE</h3>
                    <p class="text-red-600 font-bold mb-4">$85.00</p>
                    <button onclick="addToCart('COMBO CARNE', 85.00)" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold shadow-md">AGREGAR</button>
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="glass-card rounded-[2rem] overflow-hidden shadow-xl border border-white">
                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=500" class="w-full h-48 object-cover">
                <div class="p-6">
                    <h3 class="font-800 text-lg uppercase text-gray-800">🧼 COMBO ASEO</h3>
                    <p class="text-blue-600 font-bold mb-4">$45.00</p>
                    <button onclick="addToCart('COMBO ASEO', 45.00)" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">AGREGAR</button>
                </div>
            </div>

            <!-- Producto 3 -->
            <div class="glass-card rounded-[2rem] overflow-hidden shadow-xl border border-white">
                <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=500" class="w-full h-48 object-cover">
                <div class="p-6">
                    <h3 class="font-800 text-lg uppercase text-gray-800">✨ COMBO MIXTO</h3>
                    <p class="text-purple-600 font-bold mb-4">$120.00</p>
                    <button onclick="addToCart('COMBO MIXTO', 120.00)" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold shadow-md">AGREGAR</button>
                </div>
            </div>
        </div>
    </section>

    <!-- VISTA 2: CARRITO -->
    <section id="view-carrito" class="view container mx-auto px-5 py-8 max-w-xl">
        <button onclick="showView('view-catalogo')" class="text-xs font-bold text-gray-400 mb-6 uppercase tracking-widest flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Seguir comprando
        </button>
        <div id="cart-items" class="space-y-4 mb-8"></div>
        <div class="glass-card p-6 rounded-[2rem] shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-400 font-bold text-sm uppercase">Total:</span>
                <span id="cart-total" class="text-3xl font-800 text-red-600">$0.00</span>
            </div>
            <button onclick="showView('view-checkout')" id="btn-procesar" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-800 disabled:opacity-50" disabled>IR A PAGAR</button>
        </div>
    </section>

    <!-- VISTA 3: CHECKOUT -->
    <section id="view-checkout" class="view container mx-auto px-5 py-8 max-w-xl">
        <div class="glass-card p-8 rounded-[2rem] shadow-2xl space-y-6">
            <h2 class="font-800 text-gray-800 uppercase text-sm">Datos de Entrega</h2>
            <input type="text" id="nombre" placeholder="Nombre de quien recibe" class="w-full p-4 bg-gray-50 border-2 rounded-2xl outline-none focus:border-red-500 font-semibold">
            <textarea id="direccion" placeholder="Dirección exacta en Cuba" class="w-full p-4 bg-gray-50 border-2 rounded-2xl outline-none focus:border-red-500 font-semibold" rows="3"></textarea>
            <input type="tel" id="telefono" placeholder="Teléfono" class="w-full p-4 bg-gray-50 border-2 rounded-2xl outline-none focus:border-red-500 font-semibold">
            
            <select id="pago" class="w-full p-4 bg-gray-100 rounded-2xl font-bold">
                <option value="IBAN EUROPA">🇪🇺 IBAN EUROPA</option>
                <option value="ZELLE USA">🇺🇸 ZELLE USA</option>
                <option value="BANK TRANSFER MEXICO">🇲🇽 BANK TRANSFER MEXICO</option>
                <option value="CRIPTOMONEDA">₿ CRIPTOMONEDA</option>
            </select>

            <button onclick="finalizarPedido()" class="w-full bg-green-600 text-white py-5 rounded-[1.5rem] font-800 text-lg flex items-center justify-center space-x-3 shadow-xl">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>FINALIZAR PEDIDO</span>
            </button>
        </div>
    </section>

    <script>
        const miTelefono = "17864512020";
        const formID = "1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg";
        let cart = [];
        
        // Generamos un ID de orden único que cambia cada vez que se recarga la página
        let orderID = "CC-" + Math.floor(1000 + Math.random() * 9000);

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo(0,0);
        }

        function addToCart(name, price) {
            cart.push({name, price});
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = "";
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                        <div>
                            <h4 class="font-800 text-sm uppercase">${item.name}</h4>
                            <p class="text-red-600 font-bold">$${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-gray-300"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('btn-procesar').disabled = cart.length === 0;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateUI();
        }

        function finalizarPedido() {
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            const tel = document.getElementById('telefono').value;
            const pag = document.getElementById('pago').value;

            if (cart.length === 0 || !nom || !dir || !tel) {
                alert("⚠️ Por favor, completa todos los datos de entrega.");
                return;
            }

            // Enviamos el nombre del primer producto para que el Excel lo clasifique
            const selectedCombo = cart[0].name; 

            const sendURL = `https://docs.google.com/forms/d/e/${formID}/formResponse?` +
                            `entry.905253419=${encodeURIComponent(orderID)}&` +
                            `entry.1180910425=${encodeURIComponent(selectedCombo)}&` +
                            `entry.1029821607=${encodeURIComponent(nom)}&` +
                            `entry.2133758458=${encodeURIComponent(dir)}&` +
                            `entry.922501452=${encodeURIComponent(tel)}&` +
                            `entry.895797247=${encodeURIComponent(pag)}&submit=Submit`;

            // Preparamos el mensaje de WhatsApp con todos los productos
            const listaProductos = cart.map(i => i.name).join(", ");
            const msg = `*PEDIDO: ${orderID}*\n📦 *PRODUCTOS:* ${listaProductos}\n👤 *RECIBE:* ${nom}\n📍 *DIR:* ${dir}\n📞 *TEL:* ${tel}\n💳 *PAGO:* ${pag}`;

            // 1. Envío silencioso al Excel
            fetch(sendURL, { mode: 'no-cors' });

            // 2. Abrir WhatsApp en pestaña nueva
            window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank');

            // 3. LIMPIEZA TOTAL Y REINICIO
            setTimeout(() => {
                cart = []; // Vaciar carrito
                updateUI(); // Poner contador en 0
                
                // Limpiar campos de texto
                document.getElementById('nombre').value = "";
                document.getElementById('direccion').value = "";
                document.getElementById('telefono').value = "";
                
                // Generar un nuevo ID de orden para la siguiente compra
                orderID = "CC-" + Math.floor(1000 + Math.random() * 9000);
                
                // Volver a la tienda
                showView('view-catalogo');
                
                alert("✅ Pedido procesado. El carrito se ha reiniciado para una nueva orden.");
            }, 800);
        }
    </script>
