<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEPURACIÓN | ComboCuba Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-28">

    <nav class="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-50 text-center">
        <h1 class="text-xl font-black italic uppercase">Modo de Prueba: Visualización</h1>
        <p class="text-[10px] text-blue-100 font-bold">LOS DATOS SE DEBEN CARGAR ABAJO AUTOMÁTICAMENTE</p>
    </nav>

    <!-- 1. Interfaz de Usuario -->
    <section class="container mx-auto px-4 py-6">
        <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-xl border-t-4 border-blue-500">
            <h2 class="text-center font-black text-gray-700 mb-6 uppercase italic">Paso 1: Escribe los datos aquí</h2>
            
            <div class="space-y-4">
                <input type="text" id="nombre" oninput="sincronizar()" placeholder="Nombre y Apellidos" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                
                <textarea id="direccion" oninput="sincronizar()" placeholder="Dirección Exacta" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" rows="2"></textarea>
                
                <input type="tel" id="telefono" oninput="sincronizar()" placeholder="Teléfono" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400">
                
                <select id="pago" onchange="sincronizar()" class="w-full p-4 border rounded-xl bg-gray-50 font-bold">
                    <option value="IBAN EUROPA">IBAN EUROPA</option>
                    <option value="ZELLE USA">ZELLE USA</option>
                    <option value="BANK TRANSFER MEXICO">BANK TRANSFER MEXICO</option>
                    <option value="CRIPTOMONEDA">CRIPTOMONEDA</option>
                </select>
            </div>
        </div>
    </section>

    <!-- 2. Formulario de Google Visible (Espejo) -->
    <section class="container mx-auto px-4 py-6">
        <div class="max-w-xl mx-auto">
            <h2 class="text-xs font-bold text-gray-500 uppercase mb-2 text-center">👇 Formulario de Google (Si está vacío, los IDs están mal)</h2>
            <div id="contenedor-iframe" class="border-4 border-dashed border-gray-400 rounded-2xl overflow-hidden bg-white shadow-inner">
                <!-- El iframe se genera aquí -->
            </div>
        </div>
    </section>

    <!-- 3. Botón de Simulación -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t z-50">
        <button onclick="enviarWhatsApp()" class="max-w-xl mx-auto bg-green-600 text-white w-full py-4 rounded-2xl font-black shadow-lg flex items-center justify-center text-lg active:scale-95">
            <i class="fab fa-whatsapp mr-3 text-2xl"></i> PROBAR WHATSAPP
        </button>
    </div>

    <script>
        // URL de tu formulario (MODO VIEWFORM PARA PRE-RELLENADO)
        const formBaseURL = "https://docs.google.com/forms/d/e/1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg/viewform";
        
        const entries = {
            idOrden: "entry.905253419",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        const testOrderID = "CC-TEST-001";

        function sincronizar() {
            const nom = encodeURIComponent(document.getElementById('nombre').value);
            const dir = encodeURIComponent(document.getElementById('direccion').value);
            const tel = encodeURIComponent(document.getElementById('telefono').value);
            const pag = encodeURIComponent(document.getElementById('pago').value);

            // Construir la URL con los parámetros para el Iframe
            const urlFinal = `${formBaseURL}?embedded=true` +
                             `&${entries.idOrden}=${testOrderID}` +
                             `&${entries.nombre}=${nom}` +
                             `&${entries.direccion}=${dir}` +
                             `&${entries.telefono}=${tel}` +
                             `&${entries.pago}=${pag}`;

            document.getElementById('contenedor-iframe').innerHTML = 
                `<iframe src="${urlFinal}" width="100%" height="600" frameborder="0" marginheight="0" marginwidth="0">Cargando...</iframe>`;
        }

        function enviarWhatsApp() {
            const nom = document.getElementById('nombre').value;
            alert("Si el formulario de arriba está relleno, el sistema ya está sincronizado. Ahora puedes enviarme el OK para volverlo invisible.");
            window.open(`https://wa.me/17864512020?text=Prueba: ${nom}`, '_blank');
        }

        // Iniciar la vista del Iframe al cargar
        sincronizar();
    </script>
</body>
</html>
