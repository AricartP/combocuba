<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODO PRUEBA | ComboCuba Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-yellow-50 pb-28">

    <nav class="bg-black p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto text-center">
            <h1 class="text-xl font-black text-yellow-400 uppercase italic">⚠️ MODO DE PRUEBA ACTIVO</h1>
            <p class="text-[10px] text-gray-400">Verificando sincronización con Google Sheets</p>
        </div>
    </nav>

    <!-- 1. Datos de Entrada -->
    <section class="container mx-auto px-4 py-6">
        <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-xl border-2 border-yellow-500">
            <h2 class="text-center font-black text-gray-700 mb-6 uppercase italic">Escribe aquí tus datos</h2>
            
            <div class="space-y-4">
                <input type="text" id="nombre" oninput="sincronizar()" placeholder="Nombre de quien recibe" class="w-full p-4 border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500">
                <textarea id="direccion" oninput="sincronizar()" placeholder="Dirección Exacta" class="w-full p-4 border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500"></textarea>
                <input type="tel" id="telefono" oninput="sincronizar()" placeholder="Teléfono" class="w-full p-4 border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500">
                <select id="pago" onchange="sincronizar()" class="w-full p-4 border-2 border-blue-200 rounded-xl">
                    <option value="Zelle">Zelle</option>
                    <option value="IBAN">Transferencia IBAN</option>
                    <option value="México">Transferencia México</option>
                    <option value="Cripto">Cripto</option>
                </select>
            </div>
            <p class="text-[10px] mt-4 text-blue-600 font-bold italic text-center">👇 Mira abajo como se llenan los datos solos 👇</p>
        </div>
    </section>

    <!-- 2. FORMULARIO VISIBLE (PARA DEPURE) -->
    <section class="container mx-auto px-4 py-6">
        <div class="max-w-xl mx-auto">
            <h2 class="text-xs font-bold text-gray-400 uppercase mb-2">Vista Previa del Formulario de Google (Iframe):</h2>
            <div id="contenedor-iframe" class="border-4 border-dashed border-gray-300 rounded-xl overflow-hidden bg-white">
                <!-- El iframe se cargará aquí dinámicamente -->
            </div>
        </div>
    </section>

    <!-- 3. Botón de Envío -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t z-50">
        <button onclick="enviarPrueba()" class="max-w-xl mx-auto bg-red-600 text-white w-full py-5 rounded-2xl font-black shadow-2xl flex items-center justify-center text-lg active:scale-95 transition-all">
            PROBAR ENVÍO A WHATSAPP
        </button>
    </div>

    <script>
        const formBaseURL = "https://docs.google.com/forms/d/e/1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg/viewform";
        
        // IDs que me proporcionaste
        const entries = {
            idOrden: "entry.905253419",
            combo: "entry.1180910425",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        const orderID = "TEST-" + Math.floor(Math.random() * 9999);

        function sincronizar() {
            const nom = encodeURIComponent(document.getElementById('nombre').value);
            const dir = encodeURIComponent(document.getElementById('direccion').value);
            const tel = encodeURIComponent(document.getElementById('telefono').value);
            const pag = encodeURIComponent(document.getElementById('pago').value);

            // Construcción de la URL de pre-llenado
            const urlFinal = `${formBaseURL}?embedded=true` +
                             `&${entries.idOrden}=${orderID}` +
                             `&${entries.nombre}=${nom}` +
                             `&${entries.direccion}=${dir}` +
                             `&${entries.telefono}=${tel}` +
                             `&${entries.pago}=${pag}`;

            document.getElementById('contenedor-iframe').innerHTML = 
                `<iframe src="${urlFinal}" width="100%" height="600" frameborder="0" marginheight="0" marginwidth="0">Cargando...</iframe>`;
        }

        function enviarPrueba() {
            const nom = document.getElementById('nombre').value;
            alert("Ahora revisa el formulario de arriba. Si los campos están llenos, dale al botón 'Enviar' dentro del recuadro del formulario para ver si llega al Excel.");
            window.open(`https://wa.me/17864512020?text=Prueba de mensaje: ${nom}`, '_blank');
        }

        // Ejecutar sincronización inicial
        sincronizar();
    </script>
</body>
</html>
