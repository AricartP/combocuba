<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEPURACIÓN FINAL | ComboCuba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">

    <nav class="bg-red-600 p-4 text-white shadow-lg text-center">
        <h1 class="text-xl font-black">PRUEBA DE CONEXIÓN DIRECTA</h1>
    </nav>

    <div class="container mx-auto px-4 py-6 max-w-xl">
        <!-- Interfaz Superior -->
        <div class="bg-white p-6 rounded-2xl shadow-xl mb-6">
            <div class="space-y-4">
                <select id="combo_select" class="w-full p-4 border rounded-xl bg-gray-50 font-bold">
                    <option value="">-- ELIGE COMBO --</option>
                    <option value="COMBO CARNE">COMBO CARNE</option>
                    <option value="COMBO ASEO">COMBO ASEO</option>
                    <option value="COMBO MIXTO">COMBO MIXTO</option>
                </select>

                <input type="text" id="nombre" placeholder="Nombre Destinatario" class="w-full p-4 border rounded-xl bg-gray-50">
                <textarea id="direccion" placeholder="Dirección" class="w-full p-4 border rounded-xl bg-gray-50"></textarea>
                <input type="tel" id="telefono" placeholder="Teléfono" class="w-full p-4 border rounded-xl bg-gray-50">
                
                <select id="pago" class="w-full p-4 border rounded-xl bg-gray-50 font-bold">
                    <option value="IBAN EUROPA">IBAN EUROPA</option>
                    <option value="ZELLE USA">ZELLE USA</option>
                    <option value="BANK TRANSFER MEXICO">BANK TRANSFER MEXICO</option>
                    <option value="CRIPTOMONEDA">CRIPTOMONEDA</option>
                </select>

                <button onclick="sincronizarYWhatsApp()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">
                    1. PRE-RELLENAR Y WHATSAPP
                </button>
            </div>
        </div>

        <!-- Formulario de Google (VISIBLE) -->
        <div class="bg-white p-2 rounded-2xl shadow-inner border-4 border-dashed border-gray-300">
            <p class="text-[10px] text-center font-bold text-gray-500 mb-2 italic underline">
                Paso 2: Si los datos aparecen abajo, dale al BOTÓN AZUL del propio Google para asegurar el Excel.
            </p>
            <div id="contenedor-iframe">
                <iframe id="google_frame" src="https://docs.google.com/forms/d/e/1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg/viewform?embedded=true" width="100%" height="600" frameborder="0"></iframe>
            </div>
        </div>
    </div>

    <script>
        const formBaseURL = "https://docs.google.com/forms/d/e/1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg/viewform";
        
        const entries = {
            idOrden: "entry.905253419",
            combo: "entry.1180910425",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        const testOrderID = "CC-" + Math.floor(Math.random() * 9999);

        function sincronizarYWhatsApp() {
            const comb = encodeURIComponent(document.getElementById('combo_select').value);
            const nom = encodeURIComponent(document.getElementById('nombre').value);
            const dir = encodeURIComponent(document.getElementById('direccion').value);
            const tel = encodeURIComponent(document.getElementById('telefono').value);
            const pag = encodeURIComponent(document.getElementById('pago').value);

            if (!nom || !comb) { alert("Completa los datos"); return; }

            // Actualizar el Iframe con los datos
            const urlFinal = `${formBaseURL}?embedded=true` +
                             `&${entries.idOrden}=${testOrderID}` +
                             `&${entries.combo}=${comb}` +
                             `&${entries.nombre}=${nom}` +
                             `&${entries.direccion}=${dir}` +
                             `&${entries.telefono}=${tel}` +
                             `&${entries.pago}=${pag}`;

            document.getElementById('google_frame').src = urlFinal;

            // Abrir WhatsApp después de un breve delay
            const msg = `Pedido: ${document.getElementById('combo_select').value} para ${document.getElementById('nombre').value}`;
            setTimeout(() => {
                window.open(`https://wa.me/17864512020?text=${encodeURIComponent(msg)}`, '_blank');
            }, 800);
        }
    </script>
</body>
</html>
