<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComboCuba Express | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-28">

    <!-- Navbar -->
    <nav class="bg-red-700 p-4 text-white shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-black italic">COMBOCUBA <span class="text-yellow-400">EXPRESS</span></h1>
        <div id="order-id" class="bg-red-900 px-3 py-1 rounded text-xs font-mono text-yellow-300 border border-red-400"></div>
    </nav>

    <!-- 1. Selección de Combo -->
    <section class="container mx-auto px-4 py-6">
        <h2 class="text-center font-bold text-gray-700 mb-4 uppercase italic">1. Selecciona tu Combo</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div id="c-carne" onclick="seleccionarCombo('COMBO CARNE', 'c-carne')" class="bg-white p-4 rounded-2xl shadow border-2 border-transparent cursor-pointer hover:border-red-500 transition text-center font-black">🍖 COMBO CARNE</div>
            <div id="c-aseo" onclick="seleccionarCombo('COMBO ASEO', 'c-aseo')" class="bg-white p-4 rounded-2xl shadow border-2 border-transparent cursor-pointer hover:border-blue-500 transition text-center font-black">🧼 COMBO ASEO</div>
            <div id="c-mixto" onclick="seleccionarCombo('COMBO MIXTO', 'c-mixto')" class="bg-white p-4 rounded-2xl shadow border-2 border-transparent cursor-pointer hover:border-purple-500 transition text-center font-black">✨ COMBO MIXTO</div>
        </div>
    </section>

    <!-- 2. Datos -->
    <section class="container mx-auto px-4">
        <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl shadow-xl space-y-4">
            <h2 class="text-center font-bold text-gray-700 uppercase italic">2. Datos de Entrega</h2>
            <input type="text" id="nombre" placeholder="Nombre y Apellidos de quien recibe" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-400">
            <textarea id="direccion" placeholder="Dirección Exacta (Calle, No, entre calles...)" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-400" rows="2"></textarea>
            <input type="tel" id="telefono" placeholder="Teléfono" class="w-full p-4 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-red-400">
            
            <label class="block text-[10px] font-bold text-gray-400 uppercase ml-2">Método de Pago:</label>
            <select id="pago" class="w-full p-4 border rounded-xl bg-gray-50 font-bold">
                <option value="IBAN EUROPA">IBAN EUROPA</option>
                <option value="ZELLE USA">ZELLE USA</option>
                <option value="BANK TRANSFER MEXICO">BANK TRANSFER MEXICO</option>
                <option value="CRIPTOMONEDA">CRIPTOMONEDA</option>
            </select>
        </div>
    </section>

    <!-- BOTÓN DE ACCIÓN -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t z-50">
        <button onclick="enviarTodo()" class="max-w-xl mx-auto bg-green-600 text-white w-full py-5 rounded-2xl font-black shadow-2xl flex items-center justify-center text-lg active:scale-95 transition-all">
            <i class="fab fa-whatsapp mr-3 text-3xl"></i> COMPLETAR PEDIDO
        </button>
    </div>

    <!-- EL SECRETO: Iframe oculto para el envío automático -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { }"></iframe>

    <script>
        let submitted = false;
        const miTelefono = "17864512020";
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSejwtF0br6aTdtFTbJqMeB3puPB7Zab3JJeeNpqxrbxg4x2kg/formResponse";
        
        const entries = {
            idOrden: "entry.905253419",
            combo: "entry.1180910425",
            nombre: "entry.1029821607",
            direccion: "entry.2133758458",
            telefono: "entry.922501452",
            pago: "entry.895797247"
        };

        let selectedCombo = "";
        const orderID = `CC-${Math.floor(1000 + Math.random() * 9000)}`;
        document.getElementById('order-id').innerText = `ID: ${orderID}`;

        function seleccionarCombo(nombre, id) {
            selectedCombo = nombre;
            document.querySelectorAll('[id^="c-"]').forEach(c => c.classList.remove('border-red-600', 'bg-red-50'));
            document.getElementById(id).classList.add('border-red-600', 'bg-red-50');
        }

        function enviarTodo() {
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            const tel = document.getElementById('telefono').value;
            const pag = document.getElementById('pago').value;

            if (!selectedCombo || !nom || !dir || !tel) {
                alert("Por favor completa todos los campos.");
                return;
            }

            // --- PASO 1: ENVÍO AL EXCEL (Invisible) ---
            const form = document.createElement("form");
            form.action = formURL;
            form.method = "POST";
            form.target = "hidden_iframe"; // Envía al iframe oculto

            const datos = {
                [entries.idOrden]: orderID,
                [entries.combo]: selectedCombo,
                [entries.nombre]: nom,
                [entries.direccion]: dir,
                [entries.telefono]: tel,
                [entries.pago]: pag
            };

            for (let key in datos) {
                let input = document.createElement("input");
                input.type = "hidden";
                input.name = key;
                input.value = datos[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            submitted = true;
            form.submit(); // SE ENVÍA AL EXCEL AQUÍ

            // --- PASO 2: ABRIR WHATSAPP ---
            const msg = `*NUEVO PEDIDO - COMBOCUBA*\n\n` +
                        `*ID:* ${orderID}\n` +
                        `*Producto:* ${selectedCombo}\n` +
                        `*Pago:* ${pag}\n\n` +
                        `*DATOS DE ENTREGA:*\n` +
                        `*Recibe:* ${nom}\n` +
                        `*Teléfono:* ${tel}\n` +
                        `*Dirección:* ${dir}\n\n` +
                        `_El pedido ha sido registrado en sistema._`;

            setTimeout(() => {
                window.open(`https://wa.me/${miTelefono}?text=${encodeURIComponent(msg)}`, '_blank');
            }, 400);
        }
    </script>
</body>
</html>
